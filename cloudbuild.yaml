steps:
  # 1. Build the container image using buildpacks
  - name: 'gcr.io/k8s-skaffold/pack'
    entrypoint: 'pack'
    args:
      - 'build'
      - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-22'
      - '--path=.'
  
  # 2. Deploy container image to Cloud Run in USA
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'utkalskillcentre-us'
      - '--image'
      - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'

options:
  # THIS FIXES THE LOGGING ERROR!
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
