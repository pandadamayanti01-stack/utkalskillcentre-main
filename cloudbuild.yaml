steps:
  # 1. Build the container image using buildpacks
  - name: 'gcr.io/k8s-skaffold/pack'
    entrypoint: 'pack'
    args:
      - 'build'
      - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'
      - '--builder=gcr.io/buildpacks/builder:v1'
      - '--path=.'
  
  # 2. Deploy container image to Cloud Run in Mumbai
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'utkalskillcentre-main'
      - '--image'
      - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'

  # 3. Deploy Firebase Hosting configuration
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npx -y firebase-tools deploy --only hosting --project $PROJECT_ID || echo "Firebase deploy failed, you may need to grant Firebase Admin role to the Cloud Build service account."'

images:
  - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'

options:
  # THIS FIXES THE LOGGING ERROR!
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
