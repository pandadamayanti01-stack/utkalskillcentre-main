steps:
  # 1. Build and Deploy to Cloud Run using source code
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--source'
      - '.'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY,RAZORPAY_KEY_ID=$_RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET=$_RAZORPAY_KEY_SECRET,VITE_RAZORPAY_KEY=$_VITE_RAZORPAY_KEY'

options:
  # THIS FIXES THE LOGGING ERROR!
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
