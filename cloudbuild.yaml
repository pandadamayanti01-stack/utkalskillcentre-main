# Cache-enabled Google Cloud Build Pipeline
steps:
  # 1. Pull the latest image from the registry to use as a cache source
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest || exit 0'

  # 2. Build the Docker container image using the cache
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--cache-from', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest',
      '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest',
      '.'
    ]

  # 3. Push the Docker images to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
    ]
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'
    ]

  # 4. Deploy the container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'NODE_ENV=production,USE_VERTEX_AI=true,GEMINI_API_KEY=$_GEMINI_API_KEY,RAZORPAY_KEY_ID=$_RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET=$_RAZORPAY_KEY_SECRET,VITE_RAZORPAY_KEY=$_VITE_RAZORPAY_KEY,FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET,FIRESTORE_DATABASE_ID=utkal-prod,VITE_FIREBASE_DATABASE_ID=utkal-prod,YOUTUBE_API_KEY=$_YOUTUBE_API_KEY'
      - '--set-build-env-vars'
      - 'VITE_RAZORPAY_KEY=$_VITE_RAZORPAY_KEY,VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID,VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_DATABASE_ID=utkal-prod,VITE_YOUTUBE_API_KEY=$_VITE_YOUTUBE_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

substitutions:
  _GEMINI_API_KEY: ''
  _RAZORPAY_KEY_ID: ''
  _RAZORPAY_KEY_SECRET: ''
  _VITE_RAZORPAY_KEY: ''
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _VITE_FIREBASE_MEASUREMENT_ID: ''
  _YOUTUBE_API_KEY: ''
  _VITE_YOUTUBE_API_KEY: ''
