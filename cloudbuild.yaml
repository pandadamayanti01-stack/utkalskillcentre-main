steps:
  # 1. Build the container image using buildpacks
  - name: 'gcr.io/k8s-skaffold/pack'
    entrypoint: 'pack'
    args:
      - 'build'
      - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-22'
      - '--path=.'
  
  # 2. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY,RAZORPAY_KEY_ID=$_RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET=$_RAZORPAY_KEY_SECRET,VITE_RAZORPAY_KEY=$_VITE_RAZORPAY_KEY'

images:
  - 'gcr.io/$PROJECT_ID/utkalskillcentre-main:$COMMIT_SHA'

options:
  # THIS FIXES THE LOGGING ERROR!
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
