<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </radialGradient>

    <!-- Headband Gradient -->
    <linearGradient id="pinkRibbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5D8F" />
      <stop offset="50%" stop-color="#FF85A2" />
      <stop offset="100%" stop-color="#FF5D8F" />
    </linearGradient>

    <!-- Flower Petal Gradient -->
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB5A7" />
      <stop offset="100%" stop-color="#FF7096" />
    </radialGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Red Accent Gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
  </defs>

  <!-- Outer Glass Circle Base -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" stroke="#CBD5E1" stroke-width="4" filter="drop-shadow(0px 8px 24px rgba(148, 163, 184, 0.15))" />

  <!-- Sambalpuri Checkered Border Trim Loop -->
  <g id="checkeredBorder">
    <!-- Inner Gold Ring -->
    <circle cx="256" cy="256" r="222" fill="none" stroke="url(#goldGrad)" stroke-width="6" />
    <!-- Outer Checked Ring -->
    <circle cx="256" cy="256" r="231" fill="none" stroke="#0F172A" stroke-width="12" stroke-dasharray="16 16" />
    <circle cx="256" cy="256" r="231" fill="none" stroke="url(#redGrad)" stroke-width="12" stroke-dasharray="16 16" stroke-dashoffset="16" />
  </g>

  <!-- Background Sparks & Stars -->
  <g opacity="0.8">
    <path d="M 90 200 L 95 205 L 90 210 L 85 205 Z" fill="#FBBF24" />
    <path d="M 410 180 L 415 185 L 410 190 L 405 185 Z" fill="#EF4444" />
    <path d="M 130 110 L 138 118 L 130 126 L 122 118 Z" fill="#10B981" />
    <path d="M 380 110 L 388 118 L 380 126 L 372 118 Z" fill="#3B82F6" />
    <circle cx="256" cy="75" r="4" fill="#F59E0B" />
  </g>

  <!-- Baby Girl Mascot Face & features -->
  <g transform="translate(0, -10)">
    <!-- Hair (Back) -->
    <path d="M 160 230 C 160 140, 352 140, 352 230 C 352 240, 340 250, 340 230 C 340 160, 172 160, 172 230 C 172 250, 160 240, 160 230 Z" fill="#292524" />

    <!-- Ears -->
    <circle cx="164" cy="235" r="18" fill="#FDBA74" />
    <circle cx="348" cy="235" r="18" fill="#FDBA74" />

    <!-- Face Shape -->
    <circle cx="256" cy="230" r="86" fill="#FED7AA" />

    <!-- Hair Bangs (Front) -->
    <path d="M 170 210 Q 210 170, 256 195 Q 302 170, 342 210 Q 352 180, 256 160 Q 160 180, 170 210 Z" fill="#292524" />

    <!-- Headband (Pink Ribbon) -->
    <path d="M 168 214 Q 256 172, 344 214" fill="none" stroke="url(#pinkRibbon)" stroke-width="18" stroke-linecap="round" />

    <!-- Rosy Cheeks -->
    <circle cx="198" cy="254" r="16" fill="#FCA5A5" opacity="0.5" />
    <circle cx="314" cy="254" r="16" fill="#FCA5A5" opacity="0.5" />

    <!-- Big Sparkly Eyes -->
    <!-- Left Eye -->
    <circle cx="216" cy="228" r="16" fill="#1C1917" />
    <circle cx="211" cy="223" r="5" fill="#FFFFFF" />
    <circle cx="221" cy="233" r="2.5" fill="#FFFFFF" />
    <!-- Right Eye -->
    <circle cx="296" cy="228" r="16" fill="#1C1917" />
    <circle cx="291" cy="223" r="5" fill="#FFFFFF" />
    <circle cx="301" cy="233" r="2.5" fill="#FFFFFF" />

    <!-- Eyelashes / Brows -->
    <path d="M 198 212 Q 216 204, 234 212" fill="none" stroke="#292524" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 278 212 Q 296 204, 314 212" fill="none" stroke="#292524" stroke-width="3.5" stroke-linecap="round" />

    <!-- Bindi (Traditional Forehead Dot) -->
    <circle cx="256" cy="214" r="7" fill="#1C1917" />

    <!-- Cute Smiling Mouth -->
    <path d="M 238 258 Q 256 276, 274 258" fill="none" stroke="#E11D48" stroke-width="5" stroke-linecap="round" />

    <!-- Pink Flower on Headband -->
    <g transform="translate(324, 184)">
      <!-- Back Petals -->
      <circle cx="-14" cy="0" r="14" fill="url(#petalGrad)" />
      <circle cx="14" cy="0" r="14" fill="url(#petalGrad)" />
      <circle cx="0" cy="-14" r="14" fill="url(#petalGrad)" />
      <circle cx="0" cy="14" r="14" fill="url(#petalGrad)" />
      <!-- Diagonal Petals -->
      <circle cx="-10" cy="-10" r="14" fill="url(#petalGrad)" />
      <circle cx="10" cy="-10" r="14" fill="url(#petalGrad)" />
      <circle cx="-10" cy="10" r="14" fill="url(#petalGrad)" />
      <circle cx="10" cy="10" r="14" fill="url(#petalGrad)" />
      <!-- Flower Center (Yellow Bud) -->
      <circle cx="0" cy="0" r="8" fill="url(#goldGrad)" stroke="#FFFFFF" stroke-width="1.5" />
    </g>
  </g>

  <!-- Traditional Textbook Base Overlay -->
  <g transform="translate(256, 318) scale(0.85)">
    <!-- Closed Book base shape -->
    <path d="M -80 0 L 80 0 L 100 20 L -100 20 Z" fill="#1E293B" />
    <!-- Opened Magic pages -->
    <path d="M 0 0 C -40 -15, -80 0, -80 0 L -80 -10 C -80 -10, -40 -25, 0 -10 Z" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <path d="M 0 0 C 40 -15, 80 0, 80 0 L 80 -10 C 80 -10, 40 -25, 0 -10 Z" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
  </g>

  <!-- Typography Area -->
  <!-- Odia Title -->
  <text x="256" y="385" font-family="'Outfit', 'Inter', 'Noto Sans Odia', sans-serif" font-weight="900" font-size="38" fill="#0F172A" text-anchor="middle" filter="drop-shadow(0px 2px 4px rgba(15, 23, 42, 0.08))">
    ଗୁନ୍ଦୁଲୁ ଗେମ୍ ଜୋନ୍
  </text>
  
  <!-- English Subtitle -->
  <text x="256" y="420" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="15" fill="#64748B" letter-spacing="5" text-anchor="middle">
    GUNDULU GAME ZONE
  </text>

  <!-- Play Badge Indicator at bottom -->
  <g transform="translate(256, 458)">
    <rect x="-65" y="-14" width="130" height="28" rx="14" fill="url(#goldGrad)" stroke="#FFFFFF" stroke-width="2" />
    <text x="0" y="5" font-family="'Outfit', 'Inter', 'Noto Sans Odia', sans-serif" font-weight="900" font-size="12" fill="#0F172A" text-anchor="middle">
      🎮 ପାରମ୍ପରିକ ଖେଳ
    </text>
  </g>
</svg>
