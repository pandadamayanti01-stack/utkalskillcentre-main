name: Build Android App (APK & AAB)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'



      - name: Decode Signing Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is not set in GitHub repository settings!"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android.keystore

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli


      - name: Generate Android Project and Build Packages
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.BUBBLEWRAP_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.BUBBLEWRAP_KEY_PASSWORD }}
          ANDROID_SDK_ROOT: ""
        run: |
          # Build the signed APK and AAB packages directly from twa-manifest.json
          yes | bubblewrap build > bubblewrap_build.log 2>&1

      - name: Upload Android APK (Signed)
        uses: actions/upload-artifact@v4
        with:
          name: utkalskillcentre-android-apk
          path: |
            *signed.apk
            app-release-signed.apk

      - name: Upload Android App Bundle (AAB for Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: utkalskillcentre-android-aab
          path: |
            *.aab
            app-release.aab

      - name: Print Build Logs on Failure
        if: failure()
        run: |
          if [ -f bubblewrap_build.log ]; then
            cat bubblewrap_build.log
          else
            echo "No build log file found."
          fi

      - name: Upload Build Log (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bubblewrap-build-log
          path: bubblewrap_build.log
