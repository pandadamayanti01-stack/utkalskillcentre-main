name: Monthly Test Generation & Results Publishing

on:
  schedule:
    # Runs at 00:00 UTC (5:30 AM IST) on the 1st day of every month to generate papers
    - cron: '0 0 1 * *'
    # Runs at 00:00 UTC (5:30 AM IST) daily from the 11th to the 15th day of every month to publish ranks & results
    - cron: '0 0 11-15 * *'
  workflow_dispatch:
    inputs:
      target_month:
        description: 'Target month and year (e.g. "June 2026")'
        required: false
        default: ''
      publish:
        description: 'Publish results and compile rankings instead of generating papers (true/false)'
        required: false
        default: 'false'
      force:
        description: 'Force overwrite existing tests (true/false)'
        required: false
        default: 'false'

jobs:
  generate-monthly-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Monthly Test Runner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          PUBLISH_ARG=""
          DAY_OF_MONTH=$(date +%-d)
          if [ "${{ github.event.inputs.publish }}" = "true" ] || { [ "$DAY_OF_MONTH" -ge 11 ] && [ "$DAY_OF_MONTH" -le 15 ]; }; then
            PUBLISH_ARG="--publish"
          fi

          FORCE_ARG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi

          npx tsx scripts/maintenance/trigger_monthly_test.ts "${{ github.event.inputs.target_month }}" $PUBLISH_ARG $FORCE_ARG
