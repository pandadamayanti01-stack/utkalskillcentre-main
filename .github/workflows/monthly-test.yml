name: Monthly Test Generation

on:
  schedule:
    # Runs at 00:00 UTC (5:30 AM IST) on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      target_month:
        description: 'Target month and year to generate tests for (e.g. "June 2026")'
        required: false
        default: ''
      force:
        description: 'Force overwrite existing tests (true/false)'
        required: false
        default: 'false'

jobs:
  generate-monthly-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Monthly Test Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          npx tsx trigger_monthly_test.ts "${{ github.event.inputs.target_month }}" $FORCE_ARG
