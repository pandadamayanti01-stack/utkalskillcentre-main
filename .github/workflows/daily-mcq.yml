name: Daily MCQ Generation

on:
  schedule:
    # 00:37 AM UTC is 6:07 AM IST (Monday to Saturday, skipping Sunday)
    # Using an odd minute prevents GitHub from skipping the job during peak load times.
    - cron: '37 0 * * 1-6'
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI

jobs:
  generate-mcqs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Daily MCQ Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          # In GitHub Actions, tsx might not load .env properly, so we pass explicit env vars
        run: npx tsx scripts/maintenance/trigger_mcq.ts
